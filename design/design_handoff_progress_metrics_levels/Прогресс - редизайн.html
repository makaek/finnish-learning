<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Прогресс + Метрики + Уровни — редизайн</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #EDEAE3; font-family: "Golos Text", system-ui, sans-serif; }
  * { box-sizing: border-box; }
  .phone { border-radius: 40px; overflow: hidden; box-shadow: 0 22px 60px rgba(40,30,20,.22), 0 0 0 9px #15110d, 0 0 0 11px #2c2620; }
  .phone *::-webkit-scrollbar { width: 0; height: 0; display: none; }
  .phone * { scrollbar-width: none; }
</style>
</head>
<body>
<div id="root"></div>
<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#1B8E84"/>
    <g transform="translate(50,52)" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-22 16V-16M-22 16h44M-12 6l9-10 7 6 11-14" transform="scale(0.78)"/>
    </g>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="kit.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="metrics.jsx"></script>
<script type="text/babel" src="progress.jsx"></script>
<script type="text/babel" src="levels.jsx"></script>

<script type="text/babel">
const W = 390, H = 844;
const Board = ({ children }) => <div className="phone">{children}</div>;

function App() {
  return (
    <DesignCanvas>
      <DCSection id="metrics" title="Метрики · дашборд"
        subtitle="Перебалансировано. Сверху — где я в курсе (уровень + CEFR, тап → «Уровни»). «Что я знаю» — покрытие словаря. «Что подтянуть» — слабое звено + баланс и точность по режимам в одном месте. Убрано: «Полностью освоено», «Всего ответов», коробки Лейтнера, части речи, свежесть.">
        <DCArtboard id="m-dash" label="Метрики" width={W} height={H}><Board><MetricsScreen /></Board></DCArtboard>
      </DCSection>

      <DCSection id="progress" title="Прогресс · список элементов"
        subtitle="Тот же разбор по элементам, но чище и просторнее. Поиск и «↕ По уровню» — на месте. Скрытие выученных (🙈) убрано.">
        <DCArtboard id="p-list" label="Мой прогресс" width={W} height={H}><Board><ProgressScreen /></Board></DCArtboard>
      </DCSection>

      <DCSection id="levels" title="Уровни · новый экран"
        subtitle="Открывается из карточки уровня в «Метриках». Путь по 12 уровням в полосах CEFR: пройденные ✓ можно открыть для повторения, текущий подсвечен, дальше — закрыто. Кнопка «Отметить пройденным» → диалог подтверждения.">
        <DCArtboard id="l-list" label="Уровни · обзор" width={W} height={H}><Board><LevelsScreen view="list" /></Board></DCArtboard>
        <DCArtboard id="l-detail" label="Пройденный уровень (повторение)" width={W} height={H}><Board><LevelsScreen view="detail" detailLv={3} /></Board></DCArtboard>
        <DCArtboard id="l-confirm" label="«Отметить пройденным» · диалог" width={W} height={H}><Board><LevelsScreen view="confirm" /></Board></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
