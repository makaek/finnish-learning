<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Streak chip — Вариант 2 (reference)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#23262E; --sub:#71757F; --faint:#AAB1BC;
    --card:#FFFFFF; --line:#E7E3DB; --track:#EEEAE2;
    --cream:#F0EDE6; --green:#3B9C6E;
    --amberSoft:#FBE3C4; --amberSoft2:#F6CE9B; --flame:#D98324;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:#E4E0D7;font-family:"Golos Text",system-ui,sans-serif;color:var(--ink);}
  .wrap{display:flex;justify-content:center;padding:48px 20px;}
  .phone{width:390px;background:var(--cream);border-radius:26px;overflow:hidden;
    border:1px solid var(--line);box-shadow:0 18px 44px rgba(40,30,20,.16);}

  /* status bar */
  .statusbar{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;}
  .statusbar .t{font-size:14.5px;font-weight:700;}
  .statusbar .icons{display:flex;gap:7px;align-items:center;opacity:.85;}

  /* header row — title · streak · gear */
  .header{display:flex;align-items:center;gap:12px;padding:4px 18px 18px;}
  .title{font-size:22px;font-weight:800;letter-spacing:-.02em;flex:0 0 auto;}
  .spacer{flex:1 1 auto;}
  .gear{width:40px;height:40px;border-radius:13px;background:var(--card);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;flex:0 0 auto;cursor:pointer;}

  /* ===== THE STREAK CHIP (Вариант 2) ===== */
  .streak{display:flex;align-items:center;height:38px;border-radius:13px;background:var(--card);
    border:1px solid var(--line);padding:0 4px 0 5px;box-shadow:0 1px 2px rgba(40,30,20,.04);
    flex:0 0 auto;cursor:pointer;}
  .streak .flame{width:28px;height:28px;border-radius:9px;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(160deg,var(--amberSoft),var(--amberSoft2));}
  .streak .num{padding:0 8px 0 7px;font-size:17px;font-weight:800;letter-spacing:-.01em;line-height:1;}
  .streak .divider{width:1px;height:18px;background:var(--line);flex:0 0 auto;}
  .streak .week{display:flex;gap:4px;padding:0 8px;align-items:center;}
  .streak .dot{width:11px;height:11px;border-radius:999px;background:var(--track);}
  .streak .dot.done{background:var(--green);display:flex;align-items:center;justify-content:center;}

  /* filler so the chip reads in context */
  .body{padding:0 18px 22px;}
  .ghost{height:70px;border-radius:20px;background:#fff;border:1px solid var(--line);opacity:.5;}
</style>
</head>
<body>
<div class="wrap">
  <div class="phone">
    <div class="statusbar">
      <span class="t">21:19</span>
      <span class="icons">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="2" y="14" width="3" height="6" rx="1"/><rect x="7" y="10" width="3" height="10" rx="1"/><rect x="12" y="6" width="3" height="14" rx="1"/><rect x="17" y="3" width="3" height="17" rx="1"/></svg>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M2 8.5C5 6 9 4.5 12 4.5S19 6 22 8.5"/><path d="M5 12c2-1.8 4.5-2.8 7-2.8S17 10.2 19 12"/><path d="M8 15.4c1.2-1 2.6-1.5 4-1.5s2.8.5 4 1.5"/><circle cx="12" cy="18.5" r="1.1" fill="currentColor" stroke="none"/></svg>
        <svg width="22" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="7" width="18" height="10" rx="2.4"/><rect x="4" y="9" width="11" height="6" rx="1" fill="currentColor" stroke="none"/><path d="M22 10v4"/></svg>
      </span>
    </div>

    <div class="header">
      <span class="title">Финский</span>
      <div class="spacer"></div>

      <!-- streak chip -->
      <button class="streak" aria-label="Серия 1 день, сегодня выполнено">
        <span class="flame">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--flame)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3s5 4 5 9a5 5 0 0 1-10 0c0-1.6.8-2.8 1.6-3.6C9 10 9.5 8.5 9 7c2 .5 3 2 3 2s.5-3 0-6Z"/></svg>
        </span>
        <span class="num">1</span>
        <span class="divider"></span>
        <span class="week">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot done"><svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12.5 9.5 18 20 6"/></svg></span>
        </span>
      </button>

      <div class="spacer"></div>
      <button class="gear" aria-label="Настройки">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#71757F" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 1 1-4 0v-.1a1.6 1.6 0 0 0-2.7-1.1l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0 .3-1.8 1.6 1.6 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.6 1.6 0 0 0 1.5-1 1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3H9a1.6 1.6 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 1 1.5 1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V9a1.6 1.6 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1Z"/></svg>
      </button>
    </div>

    <div class="body"><div class="ghost"></div></div>
  </div>
</div>
</body>
</html>
